  if ((move && move.moveId && move.moveId === lastAnimatedMoveId && !roomDisagreesOnGameState) || nothingChanged) {
    updateOverlay();
    renderTurnTimerVisibility();
    return;
  }
  // No new move to replay (either nothing changed since last time, or
  // this update isn't move-shaped at all — e.g. only `rules` changed) —
  // fall back to the plain instant-snapshot apply exactly as before.
  if (move && move.moveId) lastAnimatedMoveId = move.moveId;
  applyingRemoteUpdate = true;
  // fromRoomBoard() converts the wire-format 0-placeholders back to real
  // null for empty cells — see toRoomBoard()'s comment for why the wire
  // format differs from state.board's own representation at all.
  state.board = fromRoomBoard(room.board);
  state.boardElements = fromRoomBoard(room.boardElements);
  // See fromRoomHands's own comment — same fix as the isNewMove branch
  // above, needed here too since this fallback path is reached whenever a
  // snapshot arrives with an already-seen move (e.g. this poll/listener
  // re-reading a room whose final move already crashed a previous render
  // attempt before this fix).
  state.hands = fromRoomHands(room.hands);
  state.turn = room.turn || 'p1';
  state.gameOver = !!room.gameOver;
  if (room.rules) state.rules = room.rules;
  // See the matching comment in the isNewMove branch above — settle the
  // timer before renderAll() so the one render reflects the final state,
  // rather than painting a stale timer that nothing then corrects.
  if (!state.gameOver && state.mode === 'online' && state.seat === state.turn) {
    startTurnTimer();
  } else {
    stopTurnTimer();
  }
  renderAll();
  applyingRemoteUpdate = false;
}

// Duration (ms) of Sound/Player Select.wav, measured directly off the file
// (ffprobe: 1.708209s, rounded up to the nearest ms) — kept as its own
// constant (rather than just hardcoding the spin's shorter duration below)
// so the sound's real length stays documented/traceable even though the
// animation itself no longer runs for the full length of it.
const PLAYER_SELECT_SFX_DURATION_MS = 1709;
// The spin animation intentionally settles 200ms before the sound actually
// finishes playing, so the arrow visually "lands" a beat ahead of the
// sound's tail end rather than exactly on its last frame.
const PLAYER_SELECT_SPIN_LEAD_MS = 300;
const FIRST_PLAYER_SPIN_DURATION_MS = PLAYER_SELECT_SFX_DURATION_MS - PLAYER_SELECT_SPIN_LEAD_MS;

// Spins the arrow — for exactly as long as the Player Select sound plays,
// see PLAYER_SELECT_SFX_DURATION_MS — and settles pointing at whichever
// seat `firstPlayer` is — left toward P1's hand, right toward P2's,
// matching their actual on-screen positions. Blocks the board underneath
// via the overlay's own z-index/background (see #firstPlayerSpinner CSS)
// so nothing can be clicked before it resolves. The resting/unrotated
// arrow graphic points right (toward P2) — see the CSS comment on
// #firstPlayerArrow — so pointing at P1 needs an extra +180°.
function playFirstPlayerSpin(firstPlayer) {
  const overlay = document.getElementById('firstPlayerSpinner');
  const arrow = document.getElementById('firstPlayerArrow');
  const label = document.getElementById('firstPlayerLabel');
  if (!overlay || !arrow || !label) return Promise.resolve();
  label.textContent = 'Deciding who goes first...';
  overlay.classList.remove('hidden');
  playSfx('playerSelect');
  // Several full spins for the visual effect, landing on a final angle
  // that also happens to point at the right seat — 360*N is a "free" spin
  // that ends at the same visual angle as 0, so adding the seat's target
  // offset on top of that still lands exactly where intended.
  const fullSpins = 5 * 360;
  const targetAngle = fullSpins + (firstPlayer === 'p1' ? 180 : 0);
  const anim = arrow.animate([
    { transform: 'rotate(0deg)' },
    { transform: `rotate(${targetAngle}deg)` }
  ], { duration: FIRST_PLAYER_SPIN_DURATION_MS, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'forwards' });
  return anim.finished.catch(() => {}).then(() => {
    const isMe = state.mode === 'online' && state.seat === firstPlayer;
    label.textContent = isMe ? 'You go first!' : (firstPlayer === 'p1' ? 'Player 1 goes first!' : 'Player 2 goes first!');
    return new Promise(resolve => setTimeout(resolve, 700));
  }).then(() => {
    overlay.classList.add('hidden');
    arrow.style.transform = '';
    // Belt-and-suspenders for the active-hand cursor specifically: the
    // caller (applyRoomSnapshot) already runs a full renderAll() right
    // after this promise resolves, which should reposition it correctly
    // on its own — but that measurement (updateActiveHandArrow's
    // getBoundingClientRect() call) needs the browser to have actually
    // committed a layout pass reflecting the just-removed 'hidden' class
    // on #handP1/#handP2's now-visible cards first. On the client that
    // was ALSO the one busy performing the deal's Firebase write a moment
    // earlier (the p1-seat/dealing client), that write and this same-tick
    // render can end up competing for the same paint, occasionally
    // leaving the very first measurement stale/zeroed. Re-running it one
    // frame later — after the browser has definitely painted — costs
    // nothing (idempotent) and closes that gap regardless of which
    // client hits it.
    requestAnimationFrame(() => { if (typeof updateActiveHandArrow === 'function') updateActiveHandArrow(); });
  });
}

// Shows/hides a "waiting for the other player" state using the same
// overlay as the first-player spin (see #firstPlayerSpinner), just with
// the arrow hidden and a static message instead of an animation — no
// need for a second overlay element for what's visually the same "board
// is blocked, here's why" treatment.
function showWaitingForOpponent() {
  const overlay = document.getElementById('firstPlayerSpinner');
  const arrow = document.getElementById('firstPlayerArrow');
  const label = document.getElementById('firstPlayerLabel');
  if (!overlay || !arrow || !label) return;
  arrow.style.display = 'none';
  label.textContent = 'Waiting for another player to join...';
  overlay.classList.remove('hidden');
}

function hideWaitingForOpponent() {
  const overlay = document.getElementById('firstPlayerSpinner');
  const arrow = document.getElementById('firstPlayerArrow');
  if (!overlay || !arrow) return;
  // Only actually hide the overlay if it's still showing the waiting
  // message — if playFirstPlayerSpin() has already taken over (both
  // seats filled, spin now in progress or just finished), its own
  // show/hide + arrow display handling owns the overlay at that point and
  // this shouldn't fight with it.
  const label = document.getElementById('firstPlayerLabel');
  if (label && label.textContent === 'Waiting for another player to join...') {
    overlay.classList.add('hidden');
  }
  arrow.style.display = '';
}

// Starts a joined room: subscribes to live updates and, if this client is
// the one that created the room (empty board, nobody's dealt yet), deals
// the opening hands and writes the very first state everyone else's
// listener will pick up. Whoever's transaction actually claimed p1 first
// is the natural "room owner" for this purpose — no separate election
// needed since seat-claiming already happened atomically.
function startOnlineRoom(roomId, seat) {
  // Tear down any listener already attached to a PREVIOUS room before
  // attaching a new one. Without this, entering a second game (Play/Join
  // again without properly leaving the first) left the old room's .on()
  // listener running forever — both rooms' snapshots then raced against
  // the same shared state (state.board/hands, showWaitingForOpponent, the
  // module-level roomListenerRef itself, etc.), so whichever room's update
  // happened to arrive last would win and silently overwrite the other's
  // UI — e.g. the first room's "both seats filled" snapshot arriving after
  // the second room's "still waiting" one would hideWaitingForOpponent()
  // for a game that was, in fact, still waiting. Only one room listener
  // should ever be live at a time.
  stopRoomListener();
  const mySession = ++roomSession;
  stopTurnTimer();
  stopDisplayTimerInterval();
  state.mode = 'online';
  state.roomId = roomId;
  state.seat = seat;
  state.selected = null;
  state.roomRematch = null;
  state.roomTurnStartedAt = null;
  state.roomSeats = null;
  // Clears any leftover hand/board DOM from whatever was on screen before
  // (a finished practice game, a previous room) immediately — before the
  // first Firebase snapshot even arrives, let alone before the "who goes
  // first" spin resolves. Without this, stale cards from a prior game
  // could sit there fully clickable underneath the spin overlay, which
  // only covers .board-col, not the hands (see canAct's spinner check for
  // why clicks are also blocked directly, as a second layer).
  state.board = Array(9).fill(null);
  state.hands = { p1: [], p2: [] };
  renderAll();
  const roomRef = rtdb.ref(`${ROOMS_ROOT}/${roomId}`);
  // Establishes a baseline BEFORE the live listener below starts —
  // otherwise a client joining a room that already has moves in it (e.g.
  // a mid-game reconnect, or a spectator joining after several moves have
  // already happened) would see its very first snapshot's lastMove as
  // "new" and incorrectly replay a move that already happened, complete
  // with a card appearing to leave a hand it left minutes ago. Reading
  // once here means the live listener's own first fire (which reads the
  // same data again) correctly treats that pre-existing move as
  // already-seen, so only genuinely subsequent moves ever animate.
  // Attaching the live listener + poll was previously gated entirely on
  // this one once('value') baseline read resolving first (see its own
  // comment below for why the baseline matters at all). If that single
  // read ever hangs — e.g. the SDK's websocket hasn't finished connecting
  // yet right after a fresh page load/matchmaking, a brief network hiccup,
  // anything short of an outright permanent failure — NEITHER the live
  // listener NOR the poll fallback ever got attached, since both lived
  // inside this same .then(). The player would see a permanently blank
  // board with no error and no indication anything was wrong, and only a
  // full page refresh (a totally fresh connection from scratch) would ever
  // recover it. Racing the baseline read against a timeout means a slow
  // first read can no longer block the listener/poll from attaching at
  // all — worst case, the baseline's lastAnimatedMoveId pre-seeding is
  // skipped (which only matters for a mid-game reconnect anyway; a fresh
  // room has no lastMove to mis-seed against in the first place) and the
  // live listener's own first natural fire does the same job a beat later.
  let baselineSettled = false;
  const attachLiveHandling = snap => {
    if (baselineSettled || mySession !== roomSession) return;
    baselineSettled = true;
    if (snap) {
      const room = snap.val();
      if (room && room.lastMove && room.lastMove.moveId) {
        lastAnimatedMoveId = room.lastMove.moveId;
      }
    }
    roomListenerRef = roomRef;
    roomRef.on('value', snap2 => handleOnlineRoomSnapshot(snap2, roomId, seat, roomRef));
    // See startRoomPoll's own comment — a periodic fallback read in case
    // the live listener above ever silently stops delivering.
    startRoomPoll(roomRef, snap2 => handleOnlineRoomSnapshot(snap2, roomId, seat, roomRef));
  };
  roomRef.once('value').then(attachLiveHandling).catch(() => attachLiveHandling(null));
  setTimeout(() => attachLiveHandling(null), 2500);
}

function handleOnlineRoomSnapshot(snap, roomId, seat, roomRef) {
  const room = snap.val();
  if (!room) return;
  const boardIsEmpty = Array.isArray(room.board) && room.board.every(c => !c);
  const handsAreEmpty = !room.hands || (!(room.hands.p1 || []).length && !(room.hands.p2 || []).length);
  const bothSeatsFilled = !!(room.seats && room.seats.p1 && room.seats.p2);
  // Nobody's dealt yet and the other seat is still empty — tell this
  // client it's waiting, and keep the board/hands blocked (canAct()
  // already refuses clicks while #firstPlayerSpinner is visible, which
  // this reuses) rather than leaving an unexplained empty board with no
  // opponent and no indication anything is supposed to happen.
  if (!room._dealt && !bothSeatsFilled) {
    showWaitingForOpponent();
  } else {
    hideWaitingForOpponent();
  }
  // Both seated players have opted into a rematch (see requestRematch) —
  // reset the room back to a pre-deal shape so the existing "p1 deals once
  // the board/hands are empty and both seats are filled" logic just below
  // picks it up and deals again naturally, same as the room's very first
  // game. Only p1's client performs the write (consistent with every
  // other "someone has to be the one who acts" case in this room), and
  // only once — the reset write itself flips rematch back to false/false,
  // so this condition stops being true again until the NEXT time both
  // players opt in after this new game also ends.
  const bothWantRematch = !!(room.rematch && room.rematch.p1 && room.rematch.p2);
  if (seat === 'p1' && bothWantRematch && room._dealt) {
    // lastMove is deliberately left untouched here (not cleared) — it'll
    // still hold the just-finished game's final move, but that's harmless:
    // both clients already have that exact moveId recorded in their own
    // lastAnimatedMoveId (they each animated it as the real game-ending
    // move), so it reads as "already seen" and won't replay. The first
    // real move of the new game writes a genuinely new moveId, which
    // correctly gets treated as new. See toRoomBoard's own comment for why
    // board/boardElements go through it even though every cell is null.
    roomRef.update({
      board: toRoomBoard(Array(9).fill(null)),
      boardElements: toRoomBoard(Array(9).fill(null)),
      // toRoomHands() — see its own comment — for the same reason as
      // board/boardElements above: both hands are genuinely empty here
      // (pre-deal, waiting for the dealing branch below to fill them),
      // which would otherwise hit the exact same empty-array-drops bug
      // that broke the game-ending move.
      hands: toRoomHands({ p1: [], p2: [] }),
      gameOver: false,
      rematch: { p1: false, p2: false },
      _dealt: false,
    });
    return;
  }
  if (seat === 'p1' && boardIsEmpty && handsAreEmpty && bothSeatsFilled && !room._dealt) {
    // Only deals once BOTH seats are filled — dealing as soon as p1
    // alone showed up (the old behavior) meant p2 could arrive to an
    // already-dealt game with no "who goes first" moment to show. Still
    // always the p1-seat client that deals, for the same "no separate
    // election needed" reason as before.
    const dealt = dealHands();
    // generateBoardElements() (via handElementPool()) reads state.hands
    // directly rather than taking hands as a parameter — it has to be
    // set locally before calling it here, otherwise it'd generate tiles
    // against whatever stale hands were already in state (likely empty),
    // silently breaking Elemental Hand Alignment for the room's very
    // first deal specifically.
    const handsBeforeDeal = state.hands;
    state.hands = dealt;
    const boardElements = room.rules && room.rules.elemental
      ? generateBoardElements([0, 1, 2, 3, 4, 5, 6, 7, 8])
      : Array(9).fill(null);
    // Put it back the way it was (empty) rather than leaving `dealt`
    // sitting in state.hands — this assignment above was only ever a
    // scratch value for generateBoardElements() to read, not a real
    // "the deal has been applied" signal. Leaving it set here made this
    // client's OWN write echo back through its own listener a moment
    // later look, to applyRoomSnapshotNow's "did anything actually
    // change" guard, exactly like a no-op (state.hands already matched
    // the incoming room.hands, since both were populated from this same
    // `dealt` value) — so that guard skipped the render entirely and this
    // dealing client never painted its own freshly dealt hands/board at
    // all, leaving it stuck on a blank board with a live, correctly
    // synced turn timer (everything BUT the actual cards) until a refresh
    // forced a fresh read. Resetting it back to empty here means the
    // upcoming echo is correctly seen as a real, unapplied change again,
    // exactly like it is on every other (non-dealing) client.
    state.hands = handsBeforeDeal;
    // The coin flip itself: decided once, here, by whichever client is
    // doing the dealing, and written alongside everything else — every
    // client (including this one, on the listener's next fire) reads
    // the SAME firstPlayer value back out of Firebase rather than each
    // independently rolling their own random pick, which could disagree.
    const firstPlayer = Math.random() < 0.5 ? 'p1' : 'p2';
    // toRoomBoard() here for the same reason as writeLocalStateToRoom —
    // boardElements is Array(9).fill(null) whenever the Elemental rule
    // is off (the common case, since it defaults off), and writing that
    // directly would let Firebase silently drop the whole key.
    // dealId uniquely identifies THIS deal (as opposed to the room itself,
    // which can now live across multiple deals via rematches) — see
    // firstPlayerSpinShownForDeal's comment for why that distinction
    // matters: it's what lets the "who goes first" spin play again on a
    // rematch instead of silently skipping itself after the first game.
    const dealId = state.roomId + '_deal_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
    // See writeLocalStateToRoom's matching comment — this starts the
    // shared countdown clock for the very first turn. It's written at
    // deal time, a moment before the "who goes first" spin actually
    // finishes playing on each client, so the synced display timer runs a
    // beat ahead of the active player's own real 90s window (which still
    // starts fresh, locally, once THEIR spin finishes — see
    // playFirstPlayerSpin's .then()) — a small, harmless display-only skew,
    // not an actual fairness issue, since only the active player's own
    // local deadline ever triggers autoPlaceRandomCard().
    roomRef.update({ hands: dealt, boardElements: toRoomBoard(boardElements), turn: firstPlayer, firstPlayer, turnStartedAt: firebase.database.ServerValue.TIMESTAMP, dealId, _dealt: true });
    return; // the update above re-fires this listener with real data
  }
  applyRoomSnapshot(room);
}

// Shared by startSpectating's live listener and its poll fallback (see
// startRoomPoll) — kept as a standalone named function rather than an
// inline arrow so both can call the exact same logic.
function handleSpectateSnapshot(snap) {
  const room = snap.val();
  if (!room) return;
  // Same "tell them they're waiting" treatment as startOnlineRoom — a
  // spectator opening a room that only has one seat filled should see why
  // nothing's happening yet too, not just a blank board.
  const bothSeatsFilled = !!(room.seats && room.seats.p1 && room.seats.p2);
  if (!room._dealt && !bothSeatsFilled) {
    showWaitingForOpponent();
  } else {
    hideWaitingForOpponent();
  }
  applyRoomSnapshot(room);
}

// Spectator variant of startOnlineRoom — subscribes to the same live data,
// never claims a seat, never deals, never writes anything back.
function startSpectating(roomId) {
  // See the matching comment in startOnlineRoom — same leaked-listener
  // concern applies here (e.g. watching one game, then watching another
  // without going back to the menu in between).
  stopRoomListener();
  const mySession = ++roomSession;
  stopTurnTimer();
  stopDisplayTimerInterval();
  state.mode = 'spectate';
  state.roomId = roomId;
  state.seat = null;
  state.selected = null;
  state.roomTurnStartedAt = null;
  state.roomSeats = null;
  // See the matching comment in startOnlineRoom — same stale-DOM concern
  // applies here too.
  state.board = Array(9).fill(null);
  state.hands = { p1: [], p2: [] };
  renderAll();
  const roomRef = rtdb.ref(`${ROOMS_ROOT}/${roomId}`);
  // Same reasoning as startOnlineRoom's matching once()-before-on() —
  // establishes a baseline so a spectator joining a game already in
  // progress doesn't see its first snapshot's lastMove as new and replay
  // a move that already happened before they ever opened this room.
  // See the matching comment in startOnlineRoom for why this baseline read
  // is raced against a timeout rather than being the sole gate on
  // attaching the listener/poll — a slow/stuck first read used to mean
  // NEITHER ever got attached, leaving a spectator staring at a
  // permanently blank board until a full page refresh.
  let baselineSettled = false;
  const attachLiveHandling = snap => {
    if (baselineSettled || mySession !== roomSession) return;
    baselineSettled = true;
    if (snap) {
      const room = snap.val();
      if (room && room.lastMove && room.lastMove.moveId) {
        lastAnimatedMoveId = room.lastMove.moveId;
      }
    }
    roomListenerRef = roomRef;
    roomRef.on('value', snap2 => handleSpectateSnapshot(snap2));
    // See startRoomPoll's own comment — a periodic fallback read in case
    // the live listener above ever silently stops delivering.
    startRoomPoll(roomRef, snap2 => handleSpectateSnapshot(snap2));
  };
  roomRef.once('value').then(attachLiveHandling).catch(() => attachLiveHandling(null));
  setTimeout(() => attachLiveHandling(null), 2500);
}

function leaveOnlineRoomOrSpectate() {
  stopRoomListener();
  // Also invalidates any startOnlineRoom/startSpectating call whose
  // roomRef.once('value') read is still in flight when the user leaves —
  // without this, that call's callback could still fire after leaving
  // (mySession would've matched roomSession, since nothing else bumped it
  // yet) and attach a listener for a room the user already backed out of.
  roomSession++;
  stopTurnTimer();
  stopDisplayTimerInterval();
  hideWaitingForOpponent();
  state.mode = 'practice';
  state.roomId = null;
  state.seat = null;
  state.roomRematch = null;
  state.roomTurnStartedAt = null;
  state.roomSeats = null;
}

// Marks this client's own seat as wanting a rematch. Once BOTH seats have
// done this, handleOnlineRoomSnapshot's rematch-reset branch (see its own
// comment) resets the room back to a pre-deal shape and the normal dealing
// logic re-fires — same room, same seats, fresh hands and board, no trip
// back through the menu/matchmaking required. Deliberately does NOT stop
// the room listener or leave the room — the whole point is staying
// connected through game end, only actually disconnecting when the player
// explicitly leaves (see leaveOnlineRoomOrSpectate).
function requestRematch() {
  if (state.mode !== 'online' || !state.roomId || !state.seat) return;
  rtdb.ref(`${ROOMS_ROOT}/${state.roomId}/rematch/${state.seat}`).set(true);
}

function selectCard(owner, idx) {
  if (state.gameOver || owner !== state.turn) return;
  // renderAll() below tears down and rebuilds every hand card element,
  // including the one currently under the cursor. Browsers can synthesize
  // a fresh mouseenter on that replacement element even though the mouse
  // never actually moved, which would re-trigger the hover SFX right after
  // this click and sound like a double-up. Suppress hover SFX for one tick
  // so that phantom re-hover is ignored.
  suppressHoverSfx = true;
  requestAnimationFrame(() => { suppressHoverSfx = false; });
  if (state.selected && state.selected.owner === owner && state.selected.idx === idx) {
    state.selected = null;
    playSfx('cursorCancel');
  } else {
    state.selected = { owner, idx };
    // Always plays its own confirm sound on click, regardless of hover SFX —
    // the suppressHoverSfx guard above (and in the mouseenter handler) is
    // what stops the DOM-rebuild phantom re-hover from ALSO firing right
    // after this, so the two don't stack into an unwanted double-up.
    playSfx('cursorMove');
  }
  renderAll();
}

// ---------------------------------------------------------------
// TURN TIMER: each player gets a fixed window to make their move. If it
// runs out, a random card from their hand gets placed on a random open
// cell automatically, via the exact same placeCard() path a real click
// would take (so captures, animations, flips etc. all still play out).
// ---------------------------------------------------------------
const TURN_TIME_LIMIT_MS = 90000; // 90 seconds
let turnTimerInterval = null;
let turnDeadline = null;

function stopTurnTimer() {
  if (turnTimerInterval) {
    clearInterval(turnTimerInterval);
    turnTimerInterval = null;
  }
  turnDeadline = null;
  // Deliberately does NOT touch #turnTimer's text here. This used to blank
  // it to '' unconditionally (except when state.gameOver, where it showed
  // 0:00) — but stopTurnTimer() gets called at moments that are only ever
  // meant to be momentary, not "no timer applies now": e.g. placeCard()
  // calls it the instant a card is placed, purely to clear the OLD
  // deadline before either starting a fresh one (practice mode, or the
  // next player's own client) or waiting for the room's echo to confirm
  // whose turn it is now (online mode). In that gap the display would
  // flash blank and back — visible as "the timer disappearing" even
  // though the turn itself never actually stopped having an active timer
  // moments later. renderTurnTimerVisibility() (called from renderAll, so
  // it runs after every state change settles) is now the one place that
  // decides whether the timer should actually be shown blank/0:00/hidden,
  // based on the FINAL settled state rather than a transient mid-update
  // one.
}

function updateTurnTimerDisplay() {
  const el = document.getElementById('turnTimer');
  if (!el || turnDeadline === null) return;
  const totalSeconds = Math.max(0, Math.ceil((turnDeadline - Date.now()) / 1000));
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  el.textContent = mins + ':' + String(secs).padStart(2, '0');
  el.classList.toggle('low', totalSeconds <= 15);
}

// The single place that decides what #turnTimer should actually show,
// based on the fully-settled state after a render — as opposed to
// stopTurnTimer(), which used to blank the display itself as a side
// effect of merely clearing the OLD deadline mid-update (see its own
// comment for why that caused the timer to visibly flicker/disappear
// during an active turn). Called from renderAll(), so it always runs
// after state has finished settling for this update, and independently of
// however many times startTurnTimer()/stopTurnTimer() themselves got
// called along the way.
function renderTurnTimerVisibility() {
  const el = document.getElementById('turnTimer');
  if (!el) return;
  if (state.gameOver) {
    // No next turn to count down for, but the element stays put (rather
    // than going blank) showing 0:00 — keeps the topbar layout from
    // shifting when the game ends.
    stopDisplayTimerInterval();
    el.textContent = '0:00';
    el.classList.remove('low');
    return;
  }
  // A live countdown is currently running (turnDeadline is set) — this is
  // the active player's own client, mid-turn. Nothing to do: the running
  // setInterval (see startTurnTimer) is already keeping this element's
  // text current every 250ms, so overwriting it here would just be
  // redundant, not wrong, but skipping it avoids a same-value write. Also
  // make sure the OTHER (display-only, opponent-countdown) interval isn't
  // left running redundantly alongside this one — e.g. right after this
  // client's own turn just started.
  if (turnDeadline !== null) {
    stopDisplayTimerInterval();
    return;
  }
  // Online mode (not this client's turn — no local turnDeadline of its
  // own) or spectate mode (never has one at all) — show a live, read-only
  // countdown mirroring the ACTIVE player's remaining time instead of
  // going blank, computed from the room's shared turnStartedAt (see its
  // own comment in writeLocalStateToRoom). This is purely a display echo:
  // it never drives autoPlaceRandomCard() itself, only the active
  // player's own real turnDeadline does that.
  if ((state.mode === 'online' || state.mode === 'spectate') && state.roomTurnStartedAt) {
    renderOpponentTurnCountdown();
    startDisplayTimerInterval();
    return;
  }
  // No timer applies right now — practice mode is between turns for a
  // moment, or spectate mode, or online with no turnStartedAt yet (an
  // older room from before this existed). Blank rather than
  // stale/misleading.
  stopDisplayTimerInterval();
  el.textContent = '';
  el.classList.remove('low');
}

// Paints #turnTimer from state.roomTurnStartedAt for the WAITING player
// (see renderTurnTimerVisibility's own comment) — separate from
// updateTurnTimerDisplay(), which is the active player's own
// turnDeadline-based version. Kept as two separate functions rather than
// one merged one specifically so the active player's real countdown (the
// one autoPlaceRandomCard's timeout is based on) can never accidentally
// get its authoritative deadline overwritten by this display-only path.
function renderOpponentTurnCountdown() {
  const el = document.getElementById('turnTimer');
  if (!el || !state.roomTurnStartedAt) return;
  const elapsed = Date.now() - state.roomTurnStartedAt;
  const totalSeconds = Math.max(0, Math.ceil((TURN_TIME_LIMIT_MS - elapsed) / 1000));
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  el.textContent = mins + ':' + String(secs).padStart(2, '0');
  el.classList.toggle('low', totalSeconds <= 15);
}

// Drives renderOpponentTurnCountdown() while waiting on the other
// player's turn — a separate interval from turnTimerInterval (the active
// player's own authoritative one) so starting/stopping one can never
// interfere with the other.
let displayTimerInterval = null;
function startDisplayTimerInterval() {
  if (displayTimerInterval) return;
  displayTimerInterval = setInterval(renderOpponentTurnCountdown, 250);
}
function stopDisplayTimerInterval() {
  if (displayTimerInterval) {
    clearInterval(displayTimerInterval);
    displayTimerInterval = null;
  }
}

function startTurnTimer() {
  stopTurnTimer();
  if (state.gameOver) return;
  turnDeadline = Date.now() + TURN_TIME_LIMIT_MS;
  updateTurnTimerDisplay();
  turnTimerInterval = setInterval(() => {
    if (Date.now() >= turnDeadline) {
      stopTurnTimer();
      autoPlaceRandomCard();
      return;
    }
    updateTurnTimerDisplay();
  }, 250);
}

function autoPlaceRandomCard() {
  if (state.gameOver) return;
  const owner = state.turn;
  const hand = state.hands[owner];
  if (!hand || hand.length === 0) return;
  const openCells = state.board
    .map((cell, i) => (cell === null ? i : -1))
    .filter(i => i !== -1);
  if (openCells.length === 0) return;
  const idx = Math.floor(Math.random() * hand.length);
  const cellIndex = openCells[Math.floor(Math.random() * openCells.length)];
  state.selected = { owner, idx };
  placeCard(cellIndex);
}

// Builds the position:fixed "leaving the hand" clone used by the rise
// animation — shared by placeCard() (the mover's own real card, at
// wherever it's actually selected on screen) and buildRemoteFlightClone()
// (a synthetic stand-in for a card the mover selected, that THIS client
// never actually saw get selected). Returns null if startRect wasn't
// available (nothing to clone from).
function buildFlightClone(card, owner, startRect) {
  if (!startRect) return null;
  const flightEl = createCardElement(card, owner);
  flightEl.classList.add('in-flight');
  // The clone lives in document.body (renderAll() elsewhere calls
  // renderHand(), which does handContainer.innerHTML = '' to redraw the
  // remaining cards — anything parented inside handContainer would be
  // deleted before it gets to animate). Being outside the hand means it
  // renders at its plain unzoomed natural size, so it needs its own fix
  // to visually match the real (zoomed) card it's replacing.
  // `zoom` was tried for this and rejected: `zoom` on a position:fixed
  // element also scales its own left/top, so the clone visibly drifted
  // away from startRect the further startRect was from the viewport
  // corner — worse than just being the wrong size.
  // Fix: leave flightEl at its natural unscaled 129px (or 154.8px)
  // size — no width/height stretch. Stretching the box was scaling the
  // art (percentage-based) correctly but left every fixed-px .val
  // position offset (e.g. body.layout-og's top:17px/left:26px) pointing
  // at coordinates tuned for the small unscaled card, so on the enlarged
  // box the numbers stayed clustered near their old small-card spots —
  // cramped/overlapping instead of spread out to match. A per-property
  // font-size-only fix doesn't solve that, since the offsets themselves
  // also need to scale.
  // Instead, scale the whole clone uniformly via `transform: scale()`
  // (not `zoom` — zoom also shifts a position:fixed element's own
  // left/top, which caused the earlier displacement bug). transform
  // scales every descendant's rendered pixels together as one unit —
  // position offsets, font sizes, art — so nothing needs individual
  // per-property correction.
  // This scale has to be baked into the SAME animate() keyframes as the
  // rise/fade in playCardPlacementSequence, not set as a separate inline
  // style: WAAPI keyframes replace an element's transform outright for
  // the animation's duration, so a translate-only keyframe would silently
  // drop a scale() set beforehand — which is exactly why numbers looked
  // correct at rest but wrong specifically "while rising."
  const naturalW = 129; // .card's own unzoomed width (see .card CSS rule)
  const scaleRatio = naturalW ? (startRect.width / naturalW) : 1;
  flightEl.dataset.scaleRatio = scaleRatio;
  Object.assign(flightEl.style, {
    position: 'fixed',
    left: startRect.left + 'px',
    top: startRect.top + 'px',
    margin: '0',
    zIndex: '999',
    pointerEvents: 'none',
    transformOrigin: 'top left',
    transform: `scale(${scaleRatio})`,
  });
  document.body.appendChild(flightEl);
  return flightEl;
}

// Approximates the "leaving the hand" start position for a move THIS
// client didn't make — the opponent's own hand-card selection never
// happened here, so there's no real .card.selected element to measure.
// Finds the specific card by its stable CARD_DB id (see the
// el.dataset.cardId comment in createCardElement) in the mover's hand,
// which is still showing its PRE-move contents at this point (see the
// call site — this runs before state.hands is updated to the post-move
// value), so the exact real card that's about to leave should still be
// there to measure. Falls back to the hand container's own box (a
// reasonable stand-in — still visually "rises from the sending player's
// hand area") if that specific card can't be found for any reason.
function buildRemoteFlightClone(card, owner) {
  const handContainer = document.getElementById(owner === 'p1' ? 'handP1' : 'handP2');
  if (!handContainer) return null;
  const cardEl = card.id !== undefined
    ? handContainer.querySelector(`.card[data-card-id="${card.id}"]`)
    : null;
  const innerEl = cardEl ? cardEl.querySelector('.card-inner') : null;
  const startRect = innerEl
    ? innerEl.getBoundingClientRect()
    : (cardEl ? cardEl.getBoundingClientRect() : handContainer.getBoundingClientRect());
  return buildFlightClone(card, owner, startRect);
}

function placeCard(cellIndex) {
  if (state.gameOver || !state.selected || state.board[cellIndex]) return;
  const { owner, idx } = state.selected;
  const card = state.hands[owner][idx];

  // The mover's timer is done the instant they commit to a cell — whether
  // that was a real click or the timer itself expiring (see
  // autoPlaceRandomCard). startTurnTimer() below sets a fresh one for
  // whoever goes next.
  stopTurnTimer();

  // Snapshot exactly where the selected card visually is right now — its
  // real, live on-screen box, not a recomputed guess — and clone its look
  // into a plain position:fixed element pinned to that exact spot in real
  // viewport pixels. This clone's only job is the "leaving the hand" half
  // of the animation (rise + fade out while still over the hand) — once
  // it's faded out it gets removed entirely, and the separate "landing on
  // the board" half is handled independently by the real board card
  // element down below, in its own correct board context.
  const handContainer = document.getElementById(owner === 'p1' ? 'handP1' : 'handP2');
  const selectedCardEl = handContainer.querySelector('.card.selected') || handContainer.children[idx];
  // Selecting a card pops it via a transform on .card-inner (see
  // .card.selected .card-inner CSS), not on the outer .card box itself —
  // the outer box deliberately stays put so click-to-deselect keeps
  // working. getBoundingClientRect() only reflects a transform applied to
  // the element itself, so reading it off the outer .card missed the pop
  // entirely and measured the pre-selection resting spot. Reading it off
  // .card-inner instead gives the true final visual position, pop included.
  const selectedInnerEl = selectedCardEl ? selectedCardEl.querySelector('.card-inner') : null;
  const startRect = selectedInnerEl
    ? selectedInnerEl.getBoundingClientRect()
    : (selectedCardEl ? selectedCardEl.getBoundingClientRect() : null);
  const flightEl = buildFlightClone(card, owner, startRect);

  state.board[cellIndex] = { card, owner, _justPlaced: true };
  state.hands[owner].splice(idx, 1);
  state.selected = null;
  playSfx('cardPlace');

  const captureResult = resolveCaptures(cellIndex, owner);
  checkGameEnd();
  if (!state.gameOver) {
    state.turn = owner === 'p1' ? 'p2' : 'p1';
    // In practice mode this client controls both seats, so it always
    // starts the next timer itself. In online mode, starting a local timer
    // here unconditionally would be wrong — if it's now the OTHER seat's
    // turn, this client's own timer expiring would call
    // autoPlaceRandomCard(), which would place a card on the other
    // player's behalf. applyRoomSnapshot() (fired by this same write, via
    // this client's own room listener) already starts the timer correctly,
    // gated on state.seat === state.turn — so only actually skip it here
    // for online mode, not practice.
    if (state.mode !== 'online') startTurnTimer();
  } else {
    // Already stopped above — this second call is only to be explicit
    // that the timer is DEFINITELY off now that gameOver is confirmed
    // true. renderAll() below (via renderTurnTimerVisibility) is what
    // actually shows 0:00 for it, not this call itself.
    stopTurnTimer();
  }
  // Hold the win/lose/draw overlay back until the flip/banner sequence
  // below has fully played out, even though state.gameOver is already true.
  if (state.gameOver) state.suppressOverlay = true;
  // Broadcast the result of this move as soon as it's actually known —
  // right after resolveCaptures()/checkGameEnd() above, not after the
  // animation sequence below finishes. Waiting for the full ~1-2s
  // animation to finish before even telling the opponent/spectators a
  // move happened would just delay their own copy of the same animation
  // (see playCardPlacementSequence's own comment) for no reason.
  const moveId = state.roomId + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  // Marked as already-animated BEFORE writing — this client is about to
  // play the real animation itself a few lines down (via
  // playCardPlacementSequence), so when this same write loops back
  // through this client's own room listener a moment later,
  // applyRoomSnapshotNow needs to recognize this moveId as already seen
  // and skip triggering a second, redundant replay of the same move.
  if (state.mode === 'online') lastAnimatedMoveId = moveId;
  const writeDone = writeLocalStateToRoom({ moveId, cellIndex, owner, card, captureResult });
  renderAll();

  // writeDone is only actually waited on by playCardPlacementSequence for
  // a GAME-ENDING move (see its own comment) — every other move keeps
  // playing its animation immediately, exactly as before, since delaying
  // the normal per-move animation on a network round-trip would make
  // every single move feel laggy, not just the last one.
  playCardPlacementSequence({ cellIndex, captureResult, flightEl, writeDone });
}

// Everything AFTER a move's actual result is already known and written to
// state — the animated reveal: flight clone rising out of the hand, the
// real board card dropping into place, then the Same!/Plus!/Combo!
// banners and flip-wave reveal. Split out of placeCard() specifically so
// the exact same animated sequence can be triggered a second way: when a
// REMOTE client (the opponent, or a spectator) receives someone else's
// move over Firebase, rather than just snapping to the new board state
// with no animation, it builds its own flightEl for the mover's hand (see
// buildRemoteFlightClone) and calls this same function — one single
// reveal implementation, used whether the move was made locally or
// arrived from the network, so the two can never drift apart from each
// other over time.
function playCardPlacementSequence({ cellIndex, captureResult, flightEl, writeDone }) {
  // Figure out which cells this turn captured, so their flip animation can
  // wait until the placement animation below has fully finished.
  let placementDone = Promise.resolve();

  // Phase 1: the flight clone's entire job is leaving the hand — rise
  // straight up and fade out while still over the hand, nothing more. It
  // never travels toward the board and never touches board-context sizing,
  // so it can't reintroduce the cross-context shrink bug. Once it's faded
  // out it's discarded.
  let handLeaveDone = Promise.resolve();
  if (flightEl) {
    // scale(...) has to be included in every keyframe alongside the
    // translate — WAAPI keyframes replace the element's transform outright
    // while the animation runs, so a scale set only via inline style
    // beforehand would otherwise be dropped for the animation's duration.
    const flightScale = flightEl.dataset.scaleRatio || 1;
    const leaveAnim = flightEl.animate([
      { transform: `translate(0px, 0px) scale(${flightScale})`, opacity: 1 },
      { transform: `translate(0px, -70px) scale(${flightScale})`, opacity: 0 }
    ], { duration: 160, easing: 'ease-in' });
    handLeaveDone = leaveAnim.finished.catch(() => {}).then(() => {
      flightEl.remove();
    });
  }

  // Phase 2: landing on the board is a completely separate animation,
  // applied to the real board card element in its own real board-zoom
  // context — no shared sizing/positioning math with the hand clone at
  // all. It starts hidden, then once the hand-leave phase has finished,
  // reappears slightly oversized above its slot and falls/fades down to
  // its resting size and position.
  const cellEl = document.querySelectorAll('#board .cell')[cellIndex];
  const boardCardEl = cellEl && cellEl.querySelector('.card');
  if (boardCardEl) {
    boardCardEl.style.visibility = 'hidden';
    placementDone = handLeaveDone.then(() => {
      boardCardEl.style.visibility = '';
      const landAnim = boardCardEl.animate([
        { transform: 'translate(0px, -70px) scale(1.1)', opacity: 0 },
        { transform: 'translate(0px, 0px) scale(1)', opacity: 1 }
      ], { duration: 280, easing: 'ease-in-out' });
      return landAnim.finished.catch(() => {});
    });
  } else {
    placementDone = handLeaveDone;
  }

  placementDone.then(async () => {
    // The card has now finished dropping/fading in and is fully at rest —
    // the tile marker rendered underneath it (see renderBoard) has served
    // its purpose of being visibly covered during that animation, so drop
    // it from the DOM entirely rather than leaving it hidden behind the card.
    const landedCellEl = document.querySelectorAll('#board .cell')[cellIndex];
    const leftoverIcon = landedCellEl && landedCellEl.querySelector('.elem-icon');
    if (leftoverIcon) leftoverIcon.remove();

    // The card was rendered without its elemental modifier while it was
    // still animating into place (see renderBoard) — now that it's
    // actually landed, swap in a freshly rendered card that has the real
    // cellIndex, so the boost/penalty stats only appear at the moment the
    // card visibly settles onto the tile, not before.
    const landedCell = state.board[cellIndex];
    if (landedCellEl && landedCell) {
      const settledCardEl = createCardElement(landedCell.card, landedCell._displayOwner || landedCell.owner, cellIndex);
      const oldCardEl = landedCellEl.querySelector('.card');
      if (oldCardEl) oldCardEl.replaceWith(settledCardEl);
    }

    // Same!/Plus!/Combo! banners show first, before the actual flips
    // reveal — matching the original game's pacing. If Same triggered,
    // Plus only gets its own banner too when it captured something Same
    // didn't already cover — otherwise showing both is redundant.
    if (captureResult.same) {
      await showRuleBanner('same');
      if (captureResult.plus && captureResult.plusHasExtra) await showRuleBanner('plus');
    } else if (captureResult.plus) {
      await showRuleBanner('plus');
    }
    if (captureResult.up && captureResult.upHasExtra) await showRuleBanner('up');
    if (captureResult.combo) await showRuleBanner('combo');

    // Reveal one wave at a time — wave 0 is the initial capture(s) from the
    // card that was just placed, wave 1 is whatever those flips captured in
    // turn, and so on — so a chain reaction visibly plays out as cards
    // flipping other cards, rather than every flip landing simultaneously.
    const flipWaves = captureResult.flipWaves || [];
    let anyFlipped = false;
    for (let w = 0; w < flipWaves.length; w++) {
      flipWaves[w].forEach(i => {
        const cell = state.board[i];
        if (!cell) return;
        cell._justFlipped = false;
        delete cell._displayOwner;
        const cellEl = document.querySelectorAll('#board .cell')[i];
        if (!cellEl) return;
        // Rebuild the element with the true (new) owner so the color swap
        // happens exactly when the flip plays, not before.
        const newCardEl = createCardElement(cell.card, cell.owner, i);
        newCardEl.classList.add('flip');
        cellEl.innerHTML = '';
        cellEl.appendChild(newCardEl);
        playSfx('cardFlip');
      });
      anyFlipped = anyFlipped || flipWaves[w].length > 0;
      // Wait for this wave's flip animation to actually finish before
      // starting the next wave, unless this was the last one.
      if (w < flipWaves.length - 1) {
        await new Promise(resolve => setTimeout(resolve, 450));
      }
    }
    if (anyFlipped) updateScores();

    if (state.gameOver) {
      // Give the last flip's animation time to finish before revealing
      // the win/lose/draw screen — AND, if this was the mover's own final
      // move (writeDone is only ever passed for the local, non-replayed
      // path — see placeCard), also wait for actual confirmation that the
      // write reached Firebase before showing it. writeLocalStateToRoom
      // now retries indefinitely with backoff and never gives up/rejects
      // (see its own comment), so this simply waits for it — the win/lose
      // screen stays suppressed until the write is genuinely confirmed,
      // never revealed early with an uncertain/"might not have synced"
      // result. The actual bug that used to make the final move
      // disappear (see toRoomHands's comment — an emptied hand silently
      // lost its Firebase key and crashed the receiving client) is fixed
      // at the source, so in practice this resolves on the first try now.
      const animDone = new Promise(resolve => setTimeout(resolve, 450));
      Promise.all([animDone, writeDone || Promise.resolve()]).then(() => {
        state.suppressOverlay = false;
        updateOverlay();
      });
    }
  });
}

function resolveCaptures(index, owner) {
  const placedCell = state.board[index];
  const neighbors = getNeighbors(index);
  const opponent = owner === 'p1' ? 'p2' : 'p1';

  // Basic captures against the just-placed card
  const basicCaptures = neighbors.filter(n =>
    n.cell.owner === opponent &&
    rank(index, placedCell.card, n.mySide) > rank(n.index, n.cell.card, n.theirSide)
  );

  const toFlip = new Set(basicCaptures.map(n => n.index));
  let comboTriggered = false;
  let sameHit = false;
  let plusHit = false;
  let upHit = false;
  const sameFlipIndices = new Set();
  const plusFlipIndices = new Set();

  if (state.rules.same) {
    // Same compares each card's own printed numbers — any elemental
    // boost/nerf on either card is ignored for this comparison, unlike the
    // basic capture check above.
    const sameMatches = neighbors.filter(n =>
      placedCell.card[n.mySide] === n.cell.card[n.theirSide]
    );
    if (sameMatches.length >= 2) {
      sameMatches.forEach(n => {
        if (n.cell.owner === opponent) { toFlip.add(n.index); sameFlipIndices.add(n.index); }
      });
      // Only announce/count this as a hit if it actually flipped something —
      // 2+ matching neighbors that are already your own cards satisfy the
      // rule's condition but capture nothing, so no banner should show.
      if (sameFlipIndices.size > 0) {
        comboTriggered = true;
        sameHit = true;
      }
    }
  }

  if (state.rules.plus) {
    // Same as Same above — Plus sums each card's own printed numbers,
    // unaffected by any elemental boost/nerf.
    const groups = {};
    neighbors.forEach(n => {
      const sum = placedCell.card[n.mySide] + n.cell.card[n.theirSide];
      (groups[sum] = groups[sum] || []).push(n);
    });
    Object.values(groups).forEach(group => {
      if (group.length >= 2) {
        const groupFlipIndices = [];
        group.forEach(n => {
          if (n.cell.owner === opponent) { toFlip.add(n.index); plusFlipIndices.add(n.index); groupFlipIndices.push(n.index); }
        });
        if (groupFlipIndices.length > 0) {
          comboTriggered = true;
          plusHit = true;
        }
      }
    });
  }

  // Up rule (custom, non-standard): a neighbor exactly 1 higher than the
  // placed card on the touching side flips too, but — like Same/Plus —
  // needs 2+ neighbors to satisfy that at once to trigger.
  const upFlipIndices = new Set();
  if (state.rules.up) {
    // Same as Same/Plus above — Up compares each card's own printed
    // numbers, unaffected by any elemental boost/nerf.
    const upMatches = neighbors.filter(n =>
      n.cell.card[n.theirSide] === placedCell.card[n.mySide] + 1
    );
    if (upMatches.length >= 2) {
      upMatches.forEach(n => {
        if (n.cell.owner === opponent) { toFlip.add(n.index); upFlipIndices.add(n.index); }
      });
      if (upFlipIndices.size > 0) {
        comboTriggered = true;
        upHit = true;
      }
    }
  }

  flipCells([...toFlip], owner);

  // Flips are grouped into "waves" so the reveal can play them out in the
  // order they actually caused each other, instead of all at once: wave 0
  // is the initial capture(s) from the card that was just placed, wave 1
  // is whatever those flips captured in turn, wave 2 is whatever wave 1
  // captured, and so on — a card(s) flip leading to other card(s) flipping.
  const flipWaves = toFlip.size ? [[...toFlip]] : [];

  // Chain reaction: only runs at all if the separate Combo checkbox is on,
  // regardless of which rule(s) above triggered the initial flips.
  let chainAddedMore = false;
  if (comboTriggered && state.rules.combo) {
    let currentWave = [...toFlip];
    const visited = new Set(currentWave);
    while (currentWave.length) {
      const nextWave = [];
      currentWave.forEach(ci => {
        const chainNeighbors = getNeighbors(ci).filter(n => !visited.has(n.index));
        chainNeighbors.forEach(n => {
          if (!visited.has(n.index) &&
              n.cell.owner === opponent &&
              rank(ci, state.board[ci].card, n.mySide) > rank(n.index, n.cell.card, n.theirSide)) {
            flipCells([n.index], owner);
            visited.add(n.index);
            nextWave.push(n.index);
            chainAddedMore = true;
          }
        });
      });
      if (nextWave.length) flipWaves.push(nextWave);
      currentWave = nextWave;
    }
  }

  // Plus/Up are only worth announcing on their own if they captured
  // something the earlier-checked rule(s) didn't already cover — otherwise
  // it's just re-describing the same flips.
  const plusHasExtra = [...plusFlipIndices].some(i => !sameFlipIndices.has(i));
  const upHasExtra = [...upFlipIndices].some(i => !sameFlipIndices.has(i) && !plusFlipIndices.has(i));

  return { same: sameHit, plus: plusHit, plusHasExtra, up: upHit, upHasExtra, combo: chainAddedMore, flipWaves };
}

function flipCells(indices, newOwner) {
  indices.forEach(i => {
    if (state.board[i] && state.board[i].owner !== newOwner) {
      // Keep showing the old owner's color until the flip actually plays
      // (see placeCard) — only the game-logic owner changes right away.
      state.board[i]._displayOwner = state.board[i].owner;
      state.board[i].owner = newOwner;
      state.board[i]._justFlipped = true;
    }
  });
}

function checkGameEnd() {
  if (state.board.every(c => c !== null)) state.gameOver = true;
}

function boardCount(owner) {
  // Cells awaiting their flip reveal still count toward their displayed
  // (pre-flip) owner, so the score doesn't update ahead of the animation.
  return state.board.filter(c => c && (c._displayOwner || c.owner) === owner).length;
}

function totalScore(owner) {
  return boardCount(owner) + state.hands[owner].length;
}

// ---------------------------------------------------------------
// RENDERING
// ---------------------------------------------------------------
// cellIndex is only meaningful for a card sitting on the board — it's how
// the elemental bonus/penalty for THIS specific tile gets looked up. Hand
// cards simply omit it, so they always show their plain base stats.
function createCardElement(card, owner, cellIndex) {
  const el = document.createElement('div');
  el.className = 'card ' + (owner === 'p1' ? 'blue' : 'red');
  // Lets a remote client (see buildRemoteFlightClone) find exactly which
  // hand-card element corresponds to a move it just received over
  // Firebase, by the card's own stable CARD_DB id — otherwise there'd be
  // no reliable way to know which specific card slot in the opponent's
  // hand a given move actually removed, since that client never selected
  // it itself.
  if (card.id !== undefined) el.dataset.cardId = card.id;
  const elemBadge = card.element ? `<div class="elem-icon ${card.element.toLowerCase()}"></div>` : '';
  const mod = (cellIndex === undefined || cellIndex === null) ? 0 : elementalModifier(cellIndex, card);
  const modClass = mod > 0 ? ' val-boost' : (mod < 0 ? ' val-penalty' : '');
  const effective = side => Math.max(1, Math.min(10, card[side] + mod));
  // Elemental rule: a card under a boost/penalty always has both its plain
  // printed numbers and its adjusted (boosted/penalized) numbers rendered.
  // Which set shows by default is controlled by the "Show Adjusted Stats"
  // setting — holding the card down always reveals whichever set isn't
  // currently the default, so players can check the other one either way.
  const showAdjustedByDefault = state.showAdjustedStats;
  const adjustedSet = { top: effective('top'), right: effective('right'), bottom: effective('bottom'), left: effective('left') };
  const plainSet = { top: card.top, right: card.right, bottom: card.bottom, left: card.left };
  const primary = showAdjustedByDefault ? adjustedSet : plainSet;
  const primaryClass = showAdjustedByDefault ? modClass : '';
  const secondary = showAdjustedByDefault ? plainSet : adjustedSet;
  const secondaryClass = showAdjustedByDefault ? '' : modClass;
  const origVals = mod !== 0 ? `
      <div class="val orig top${secondaryClass}">${fmt(secondary.top)}</div>
      <div class="val orig right${secondaryClass}">${fmt(secondary.right)}</div>
      <div class="val orig bottom${secondaryClass}">${fmt(secondary.bottom)}</div>
      <div class="val orig left${secondaryClass}">${fmt(secondary.left)}</div>` : '';
  // Elemental rule: a plain +1/-1 marker dead center on the card, on top
  // of (not instead of) the per-side boosted/penalized numbers above —
  // always shown for an affected card, regardless of which stat set is
  // the current default.
  const modBadge = mod !== 0
    ? `<div class="elem-mod-badge ${mod > 0 ? 'boost' : 'penalty'}">${mod > 0 ? '+1' : '-1'}</div>`
    : '';
  el.innerHTML = `
    <div class="hit-zone"></div>
    <div class="card-inner">
      <img class="art" src="${CARD_IMG_PATH}${card.image}" alt="${card.name}" draggable="false">
      ${elemBadge}
      ${modBadge}
      <div class="val top${primaryClass}">${fmt(primary.top)}</div>
      <div class="val right${primaryClass}">${fmt(primary.right)}</div>
      <div class="val bottom${primaryClass}">${fmt(primary.bottom)}</div>
      <div class="val left${primaryClass}">${fmt(primary.left)}</div>${origVals}
      <div class="label">${card.name}</div>
    </div>
  `;
  if (mod !== 0) {
    const showOriginal = () => el.classList.add('showing-original');
    const hideOriginal = () => el.classList.remove('showing-original');
    el.addEventListener('mousedown', showOriginal);
    el.addEventListener('mouseup', hideOriginal);
    el.addEventListener('mouseleave', hideOriginal);
    el.addEventListener('touchstart', showOriginal, { passive: true });
    el.addEventListener('touchend', hideOriginal);
    el.addEventListener('touchcancel', hideOriginal);
  }
  return el;
}

// Whether THIS client is allowed to act for `owner` right now — the single
// gating point shared by both the hand (renderHand) and board (renderBoard)
// click handlers. In practice mode both seats are local and share one
// screen, so it's just the normal turn check. In online mode a client only
// controls the seat it claimed, never the other player's — clicks on the
// opponent's cards/cells are visually disabled exactly like an ended game
// would be, rather than needing a separate disabled state. Spectators never
// get to act at all, regardless of whose turn it is.
function canAct(owner) {
  if (state.gameOver) return false;
  if (owner !== state.turn) return false;
  if (state.mode === 'spectate') return false;
  if (state.mode === 'online' && state.seat !== owner) return false;
  // While the "who goes first" spin (see playFirstPlayerSpin) is showing,
  // its overlay already visually blocks the board — but it's scoped to
  // .board-col only, and doesn't cover the hands. Nothing should be
  // clickable anywhere on the page until the spin resolves and the real
  // post-deal renderAll() actually runs.
  const spinner = document.getElementById('firstPlayerSpinner');
  if (spinner && !spinner.classList.contains('hidden')) return false;
  return true;
}

function renderHand(owner) {
  const container = document.getElementById(owner === 'p1' ? 'handP1' : 'handP2');
  container.innerHTML = '';
  state.hands[owner].forEach((card, idx) => {
    const el = createCardElement(card, owner);
    if (state.selected && state.selected.owner === owner && state.selected.idx === idx) {
      el.classList.add('selected');
    }
    if (!canAct(owner)) {
      el.classList.add('disabled');
    } else {
      el.addEventListener('click', () => selectCard(owner, idx));
      el.addEventListener('mouseenter', () => {
        if (suppressHoverSfx) return;
        if (sfxState.hoverEnabled) {
          playSfx('cursorMove');
          lastHoverPlayedKey = owner + '-' + idx;
        }
      });
    }
    container.appendChild(el);
    // This element can land directly under a cursor that never actually
    // moved — renderHand() rebuilds every card from scratch on every
    // render (innerHTML = ''), including ones the mouse is currently
    // sitting still over (e.g. an online game's 3s room poll re-rendering
    // while the player is just idly hovering a card in hand, no click
    // involved). The browser still correctly applies :hover to the new
    // element, but since it's a BRAND NEW node, its CSS transition (the
    // "slide toward board" on .card-inner) animates in from scratch too —
    // visually replaying the hover slide even though, from the player's
    // perspective, the cursor never left the card. Detecting that exact
    // situation right after insertion and skipping the transition for one
    // frame makes the hovered state apply instantly instead, so a
    // same-spot re-render never visibly "replays" the slide.
    if (el.matches(':hover')) {
      const inner = el.querySelector('.card-inner');
      if (inner) {
        inner.style.transition = 'none';
        // Force layout so the transition:none above is actually applied
        // before it gets reinstated below — otherwise the browser can
        // coalesce both style writes into one recalculation and still
        // animate the transform change.
        void inner.offsetWidth;
        requestAnimationFrame(() => { inner.style.transition = ''; });
      }
    }
  });
}

function renderBoard() {
  const container = document.getElementById('board');
  container.innerHTML = '';
  state.board.forEach((cell, i) => {
    const cellEl = document.createElement('div');
    cellEl.className = 'cell';
    if (cell) {
      // Flips are triggered later, once the placement animation for this
      // turn has finished (see placeCard) — not here, so captures don't
      // visually flip (or change color) at the same time the placed card
      // is still rising/falling into place. Until then, keep showing the
      // pre-capture owner's color.
      // While the card is still animating into place, don't apply this
      // cell's elemental modifier to its displayed stats yet (pass no
      // cellIndex, so it shows its plain printed numbers) — the boost/
      // penalty should only visibly kick in once the card has actually
      // landed, not the instant it's placed. placeCard() re-renders this
      // cell with the real cellIndex once the drop animation finishes.
      const justLanding = !!cell._justPlaced;
      const cardEl = createCardElement(cell.card, cell._displayOwner || cell.owner, justLanding ? null : i);
      if (justLanding) {
        cardEl.classList.add('drop');
        cell._justPlaced = false;
        // Elemental rule: keep the tile marker in place underneath just
        // long enough for the drop/fade-in animation to visibly cover it —
        // placeCard() removes it the instant that animation finishes, so
        // once the card is at rest, the marker no longer exists at all.
        if (state.rules.elemental && state.boardElements[i]) {
          const tileIcon = document.createElement('div');
          tileIcon.className = `elem-icon ${state.boardElements[i].toLowerCase()}`;
          cellEl.appendChild(tileIcon);
        }
      }
      cellEl.appendChild(cardEl);
    } else {
      if (state.selected && canAct(state.turn)) {
        cellEl.classList.add('empty-selectable');
      }
      cellEl.addEventListener('click', () => {
        if (!canAct(state.turn)) return;
        placeCard(i);
      });
      // Elemental rule: mark this tile's element while it's still empty —
      // once a card is placed here it no longer exists in the DOM at all.
      if (state.rules.elemental && state.boardElements[i]) {
        const tileIcon = document.createElement('div');
        tileIcon.className = `elem-icon ${state.boardElements[i].toLowerCase()}`;
        cellEl.appendChild(tileIcon);
      }
    }
    container.appendChild(cellEl);
  });
}

function updateScores() {
  document.getElementById('scoreP1').textContent = totalScore('p1');
  document.getElementById('scoreP2').textContent = totalScore('p2');
}

// Returns the display name to show for a seat ('p1'/'p2') in online/
// spectate mode — the room's own chosen name, disambiguated with "(1)"/
// "(2)" suffixes if both seats happen to have picked the exact same name
// (nothing stops two players from both typing "Player", or the same
// person testing solo across two tabs — see getOrCreatePlayerId's own
// comment on that setup). Returns null in practice mode (no seats exist
// at all), so callers can fall back to the old "Player 1"/"Player 2"
// wording themselves.
function displayNameForSeat(seat) {
  if (state.mode === 'practice' || !state.roomSeats) return null;
  const mine = state.roomSeats[seat];
  if (!mine || !mine.name) return null;
  const other = state.roomSeats[seat === 'p1' ? 'p2' : 'p1'];
  const sameName = other && other.name === mine.name;
  if (!sameName) return mine.name;
  return `${mine.name} (${seat === 'p1' ? '1' : '2'})`;
}

function updateTurnIndicator() {
  const el = document.getElementById('turnIndicator');
  if (state.gameOver) {
    el.textContent = 'Game over';
    // No active player to color for once the game's over — back to the
    // neutral base color (see #turnIndicator's own CSS) rather than
    // leaving it stuck on whoever's turn it was on the final move.
    el.classList.remove('turn-p1', 'turn-p2');
    return;
  }
  const name = displayNameForSeat(state.turn);
  el.textContent = name ? `${name}'s turn` : (state.turn === 'p1' ? "Player 1's turn" : "Player 2's turn");
  // Colors the text to match the active player (see #turnIndicator.turn-p1/
  // .turn-p2 CSS, same blue/pink as the score numbers) instead of the
  // plain neutral gray it always used to be, so whose turn it is reads at
  // a glance from color alone, same as the scores already do.
  el.classList.toggle('turn-p1', state.turn === 'p1');
  el.classList.toggle('turn-p2', state.turn === 'p2');
}

function updateOverlay() {
  const overlay = document.getElementById('overlay');
  // Suppressed while flip/banner animations from the final move are still
  // playing — placeCard calls this again once they're done.
  if (!state.gameOver || state.suppressOverlay) { overlay.classList.remove('show'); return; }
  const p1 = totalScore('p1'), p2 = totalScore('p2');
  // In online mode each client has its own seat (state.seat) and the
  // "You Win"/"You Lose" graphic + text must reflect THAT seat's outcome,
  // not always Player 1's — otherwise the player seated as P2 sees the P1
  // player's result on their own screen. Practice mode has no seat concept
  // (one device, both hands visible), so it keeps the previous P1-perspective
  // framing; spectate mode isn't anyone's personal win/loss, so it also
  // stays neutral (P1-perspective graphic, but "Player X wins" text below).
  const mySeat = state.mode === 'online' && state.seat ? state.seat : 'p1';
  const myScore = mySeat === 'p1' ? p1 : p2;
  const theirScore = mySeat === 'p1' ? p2 : p1;
  const result = p1 === p2 ? 'draw' : (myScore > theirScore ? 'win' : 'lose');
  const winnerLabel = p1 === p2 ? null : (p1 > p2 ? 'Player 1' : 'Player 2');
  const text = result === 'draw' ? "It's a draw!" :
    (state.mode === 'online' ? (result === 'win' ? 'You win!' : 'You lose...') : `${winnerLabel} wins!`);
  const graphic = document.getElementById('overlayGraphic');
  graphic.src = RESULT_GRAPHICS[result];
  graphic.classList.add('show');
  document.getElementById('overlayText').textContent = `${text} (${p1} - ${p2})`;
  overlay.classList.add('show');
  const resetBtn = document.getElementById('overlayReset');
  const leaveBtn = document.getElementById('overlayLeave');
  const statusEl = document.getElementById('overlayStatus');
  if (state.mode === 'online') {
    // Online: the room stays open through game end (see requestRematch) —
    // "Play Again" becomes an opt-in Rematch that both seated players have
    // to agree to, with an explicit separate Leave button for actually
    // disconnecting, rather than the old behavior where finishing a game
    // always forced both players back to the menu.
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Rematch';
    const myRematch = state.roomRematch && state.seat && state.roomRematch[state.seat];
    const theirSeat = state.seat === 'p1' ? 'p2' : 'p1';
    const theirRematch = state.roomRematch && state.roomRematch[theirSeat];
    resetBtn.disabled = !!myRematch;
    if (myRematch && !theirRematch) {
      statusEl.textContent = 'Waiting for the other player to rematch...';
    } else if (!myRematch && theirRematch) {
      statusEl.textContent = 'The other player wants a rematch!';
    } else {
      statusEl.textContent = '';
    }
    leaveBtn.classList.remove('hidden');
    leaveBtn.textContent = 'Leave Room';
  } else if (state.mode === 'spectate') {
    // Spectators can't rematch (they're not seated) — just a way to stop
    // watching.
    resetBtn.classList.add('hidden');
    leaveBtn.classList.remove('hidden');
    leaveBtn.textContent = 'Back to Menu';
    statusEl.textContent = '';
  } else {
    // Practice: unchanged single-button behavior.
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Play Again';
    resetBtn.disabled = false;
    leaveBtn.classList.add('hidden');
    statusEl.textContent = '';
  }
}

function renderAll() {
  updateCardOpacityMode();
  renderHand('p1');
  renderHand('p2');
  renderBoard();
  updateScores();
  updateTurnIndicator();
  updateOverlay();
  updateTitleBarControls();
  syncHandBoardCenter();
  renderTurnTimerVisibility();
  updateActiveHandArrow();
}

// Points #activeHandCursor at whichever hand belongs to state.turn —
// shown from the very first turn of the match (practice AND
// online/spectate alike) through to game end, not just as a one-off
// intro animation, so it's always visually obvious whose turn it is at a
// glance without reading the text indicator. Hidden entirely once the
// game is over (no "next" turn to point at) or while spectating with no
// game yet dealt.
//
// Position is computed from the hand container's own
// getBoundingClientRect() — its horizontal center, anchored a fixed
// offset above its top edge — NOT from any individual card slot. Cards
// in Stack mode overlap and .hand.stack has a fixed height regardless of
// how many cards remain (see .hand.stack comment), so the container's
// own box is already stable for the whole game; anchoring to it (rather
// than to "the next card" or similar) means the cursor never moves as
// cards are played, only when the active player changes.
function updateActiveHandArrow() {
  const cursor = document.getElementById('activeHandCursor');
  if (!cursor) return;
  // Nothing to point at yet — no board/hands dealt at all (main menu
  // never reaches renderAll() at all, but the pre-deal moment in online
  // mode, or the brief window before the first-player spin resolves,
  // does), or the game has already ended.
  const spinner = document.getElementById('firstPlayerSpinner');
  const spinnerShowing = spinner && !spinner.classList.contains('hidden');
  const noGameYet = state.hands.p1.length === 0 && state.hands.p2.length === 0 && state.board.every(c => !c);
  const show = !state.gameOver && !spinnerShowing && !noGameYet;
  cursor.classList.toggle('hidden', !show);
  if (!show) return;
  const handEl = document.getElementById(state.turn === 'p1' ? 'handP1' : 'handP2');
  if (!handEl) { cursor.classList.add('hidden'); return; }
  const rect = handEl.getBoundingClientRect();
  // A zero-size rect means the browser hasn't actually painted a layout
  // pass for this hand yet (can happen on the client that was ALSO busy
  // performing the deal's own Firebase write moments earlier — see
  // playFirstPlayerSpin's requestAnimationFrame re-run for the full
  // story). Positioning off a degenerate rect would either hide the
  // cursor at (0,0)-ish coordinates or leave it wherever it last was,
  // neither of which is "pointing at the right hand" — retrying one frame
  // later, when a real layout pass has definitely happened, instead of
  // committing to a bad position now.
  if (rect.width === 0 && rect.height === 0) {
    requestAnimationFrame(updateActiveHandArrow);
    return;
  }
  // Must match #activeHandCursor's own width/height in CSS exactly (51px,
  // 1.5x the original 34px) — this is what centers the cursor
  // horizontally over the hand and anchors it the right distance above it.
  const cursorSize = 51;
  const gapAboveHand = 10;
  cursor.style.left = (rect.left + rect.width / 2 - cursorSize / 2) + 'px';
  cursor.style.top = (rect.top - gapAboveHand - cursorSize) + 'px';
}

// The Refresh/Reset button doubles as "reset in place" for practice mode
// but "leave to menu" for online/spectate (see resetOrLeaveToMenu) — in
// online mode specifically, showing it at all reads as an in-place reset
// option that doesn't actually exist (leaving is a real navigation away
// from the shared room, not a same-game refresh), so it's hidden entirely
// there rather than being a same slot with different, possibly confusing
// behavior. Grouped with its icon-label so both disappear together.
function updateTitleBarControls() {
  const resetGroup = document.getElementById('resetBtn')?.closest('.icon-label-group');
  if (!resetGroup) return;
  resetGroup.classList.toggle('hidden', state.mode === 'online' || state.mode === 'spectate');
}

// Online/spectate games keep every card at full opacity, even ones this
// client can't act on right now (opponent's hand, your hand on their turn,
// spectator view) — the dimmed "disabled" look reads as a real game-over
// state at a glance, which is misleading mid-match. The underlying
// .card.disabled class/canAct() gating logic is left completely alone
// (still applied, still drives click-blocking) — this just overrides its
// visual opacity via a body class, so it's easy to flip back later if
// wanted.
function updateCardOpacityMode() {
  document.body.classList.toggle('online-full-opacity', state.mode === 'online' || state.mode === 'spectate');
}

// #topbar sits only above #board (nothing below it), so .board-col's own
// box-center isn't the same point as #board's actual visual center — plain
// align-items:center on .game-row centers the BOXES, not the board itself,
// leaving the board looking lower than the hand's true middle. Rather than
// hand-tuning pixel offsets (fragile across hand styles/shapes/zoom), measure
// the real rendered positions and nudge each hand's margin so its own center
// lands exactly on #board's center.
function syncHandBoardCenter() {
  const board = document.getElementById('board');
  const handP1 = document.getElementById('handP1');
  const handP2 = document.getElementById('handP2');
  if (!board || !handP1 || !handP2) return;
  [handP1, handP2].forEach(hand => { hand.style.marginTop = '0px'; });
  const boardRect = board.getBoundingClientRect();
  const boardCenter = boardRect.top + boardRect.height / 2;
  [handP1, handP2].forEach(hand => {
    const handRect = hand.getBoundingClientRect();
    const handCenter = handRect.top + handRect.height / 2;
    const delta = boardCenter - handCenter;
    // .hand has its own `zoom` (1.15 stack / 0.85 flat), which also scales
    // any margin set on that same element — so a raw on-screen delta needs
    // to be divided back down by that factor before being written as this
    // element's margin, or the correction over/undershoots.
    const zoomFactor = parseFloat(getComputedStyle(hand).zoom) || 1;
    hand.style.marginTop = (delta / zoomFactor) + 'px';
  });
}

// ---------------------------------------------------------------
// MUSIC PLAYER
// Tracks found in the Music/ folder next to this file. Add more
// entries here (name + relative path) whenever you drop new files in.
// ---------------------------------------------------------------
// `gain` compensates for source files mastered louder/quieter than the
// others, so the Volume slider feels consistent no matter which track is
// playing.
const MUSIC_TRACKS = [
  { name: "Shuffle or Boogie", file: "Music/Shuffle or Boogie.mp3", gain: 1 },
  { name: "Tetra Master", file: "Music/Tetra Master.mp3", gain: 1.4 },
  { name: "Joustus - Cannon in B-Flat Major", file: "Music/Joustus - Cannon in B-Flat Major.mp3", gain: 0.35 },
];

function initMusicPlayer() {
  const select = document.getElementById('musicSelect');
  const audio = document.getElementById('bgAudio');
  const playBtn = document.getElementById('musicPlayBtn');
  const autoplayToggle = document.getElementById('autoplayToggle');
  const volumeSelect = document.getElementById('volumeSelect');

  MUSIC_TRACKS.forEach((track, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = track.name;
    select.appendChild(opt);
  });

  for (let v = 5; v <= 100; v += 5) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v + '%';
    if (v === 10) opt.selected = true;
    volumeSelect.appendChild(opt);
  }
  function applyVolume() {
    const track = MUSIC_TRACKS[Number(select.value)];
    const gain = (track && track.gain) || 1;
    audio.volume = Math.min(1, Math.max(0, (Number(volumeSelect.value) / 100) * gain));
  }
  applyVolume();
  volumeSelect.addEventListener('change', applyVolume);

  function loadTrack(idx, tryPlay) {
    audio.src = MUSIC_TRACKS[idx].file;
    applyVolume();
    if (tryPlay) {
      audio.play().catch(() => {});
    }
  }

  select.addEventListener('change', () => {
    loadTrack(select.value, !audio.paused);
  });

  const titleMusicBtn = document.getElementById('titleMusicBtn');
  function togglePlayback() {
    if (audio.paused) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
  }
  playBtn.addEventListener('click', togglePlayback);
  if (titleMusicBtn) titleMusicBtn.addEventListener('click', togglePlayback);

  autoplayToggle.addEventListener('change', () => {
    if (autoplayToggle.checked && audio.paused) {
      audio.play().catch(() => {});
    }
  });

  // The icon reflects actual playback state (not the Autoplay setting),
  // so it stays correct whether music started via the button, autoplay,
  // or the track selector.
  audio.addEventListener('play', () => {
    playBtn.textContent = '⏸ Pause';
    if (titleMusicBtn) titleMusicBtn.textContent = '⏸';
  });
  audio.addEventListener('pause', () => {
    playBtn.textContent = '▶ Play';
    if (titleMusicBtn) titleMusicBtn.textContent = '▶';
  });

  // Autoplay is opt-in; browsers block audio.play() unless it's called
  // from within a genuine user gesture. Settings restoring the checkbox
  // to "checked" on page load (see loadSavedSettings) fires its change
  // handler programmatically, which is NOT a user gesture — so that
  // play() attempt gets silently rejected and nothing actually plays,
  // even though the checkbox correctly shows as checked. Load the track
  // without trying to play it yet — tryStartMusicIfEnabled() (called from
  // showGameScreen(), see below) is what actually attempts playback, and
  // only once a game screen is entered, not on any arbitrary first click
