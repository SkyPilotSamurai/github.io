  // (which used to fire from clicks still sitting on the main menu).
  loadTrack(0, false);
}

// Only autoplay once an actual game is being entered (Practice/Play/Join
// Room/Watch — every one of those funnels through showGameScreen()), not
// on the very first click anywhere, which previously could fire while
// still on the main menu before any game had started. Calling this
// synchronously from inside a click handler (as showGameScreen() always
// is) still counts as "within a user gesture" for autoplay-policy
// purposes — it doesn't need its own separate pointerdown/keydown listener
// the way the old first-interaction approach did.
function tryStartMusicIfEnabled() {
  const audio = document.getElementById('bgAudio');
  const autoplayToggle = document.getElementById('autoplayToggle');
  if (audio && autoplayToggle && autoplayToggle.checked && audio.paused) {
    audio.play().catch(() => {});
  }
}

// ---------------------------------------------------------------
// SOUND EFFECTS
// ---------------------------------------------------------------
const SFX = {
  cardFlip: "Sound/Card Flip.wav",
  cardPlace: "Sound/Card Placing.wav",
  cursorMove: "Sound/Cursor Move.wav",
  cursorCancel: "Sound/Cursor Cancel.wav",
  playerSelect: "Sound/Player Select.wav",
  cardEvent: "Sound/Card Event.wav",
};

const sfxState = { enabled: true, cursorVolume: 0.1, cardVolume: 0.1, hoverEnabled: false };

// Which volume slider each sound is controlled by: cursor moves/cancels vs
// everything card-related (placing, flipping, and any future card SFX).
const SFX_CATEGORY = {
  cursorMove: 'cursor',
  cursorCancel: 'cursor',
  cardPlace: 'card',
  cardFlip: 'card',
  playerSelect: 'cursor',
  cardEvent: 'card',
};

// Set true for one animation frame around any click-triggered re-render, so
// the phantom mouseenter that fires when a hovered card's DOM element gets
// replaced out from under the cursor doesn't double up the hover SFX.
let suppressHoverSfx = false;

// Tracks which card ("owner-idx") most recently played the hover SFX for
// real (not a phantom re-hover), so a click right after that exact hover
// can skip its own sound without going silent for clicks that DIDN'T just
// follow a real hover on that card (e.g. a card becoming selectable after
// a turn switch while the mouse sits still on it).
let lastHoverPlayedKey = null;

// Browsers refuse to play any audio (including hover SFX) until the page
// has received one genuine "activation" gesture — a real click, keypress,
// or touch. Hovering doesn't count, so the very first hover of a session
// is silent no matter what. Priming playback on the first click/keydown
// ANYWHERE on the page (not just a card click) unlocks it as early as
// possible, so hover SFX works from the next hover onward.
function unlockSfxPlayback() {
  const primer = new Audio(SFX.cursorMove);
  primer.volume = 0;
  primer.play().catch(() => {});
}
window.addEventListener('pointerdown', unlockSfxPlayback, { once: true, capture: true });
window.addEventListener('keydown', unlockSfxPlayback, { once: true, capture: true });

function initSfxControls() {
  const toggle = document.getElementById('sfxToggle');
  const hoverToggle = document.getElementById('sfxHoverToggle');
  const cursorVolumeSelect = document.getElementById('cursorVolumeSelect');
  const cardVolumeSelect = document.getElementById('cardVolumeSelect');
  if (!toggle || !cursorVolumeSelect || !cardVolumeSelect) return;

  [cursorVolumeSelect, cardVolumeSelect].forEach(select => {
    for (let v = 5; v <= 100; v += 5) {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v + '%';
      if (v === 10) opt.selected = true;
      select.appendChild(opt);
    }
  });

  toggle.checked = sfxState.enabled;
  if (hoverToggle) hoverToggle.checked = sfxState.hoverEnabled;
  cursorVolumeSelect.addEventListener('change', () => {
    sfxState.cursorVolume = Number(cursorVolumeSelect.value) / 100;
  });
  cardVolumeSelect.addEventListener('change', () => {
    sfxState.cardVolume = Number(cardVolumeSelect.value) / 100;
  });

  const titleSfxBtn = document.getElementById('titleSfxBtn');
  function updateSfxIcon() {
    if (titleSfxBtn) titleSfxBtn.textContent = sfxState.enabled ? '🔊' : '🔈';
  }
  toggle.addEventListener('change', () => {
    sfxState.enabled = toggle.checked;
    updateSfxIcon();
  });
  if (titleSfxBtn) {
    titleSfxBtn.addEventListener('click', () => {
      sfxState.enabled = !sfxState.enabled;
      toggle.checked = sfxState.enabled;
      updateSfxIcon();
    });
  }
  updateSfxIcon();

  if (hoverToggle) {
    hoverToggle.addEventListener('change', () => {
      sfxState.hoverEnabled = hoverToggle.checked;
    });
  }
}

function playSfx(name) {
  if (!sfxState.enabled) return;
  const src = SFX[name];
  if (!src) return;
  const audio = new Audio(src);
  const category = SFX_CATEGORY[name] || 'card';
  audio.volume = category === 'cursor' ? sfxState.cursorVolume : sfxState.cardVolume;
  audio.play().catch(() => {});
}

// ---------------------------------------------------------------
// WIRING
// ---------------------------------------------------------------
// Rule checkboxes are hidden from Settings entirely in online/spectate
// mode (see settingsBtn's click handler above), but that's a UI-only
// guard — the checkboxes themselves still exist in the DOM with these
// same change listeners attached regardless. This is the actual
// enforcement point: even if a rule checkbox's state somehow changed
// (programmatically, a stale queued event, etc.) while online, the
// resulting state.rules mutation is refused here rather than silently
// taking effect and getting pushed to the shared room on the next move
// without the other player ever agreeing to it.
function rulesLockedForCurrentMode() {
  return state.mode === 'online' || state.mode === 'spectate';
}
document.getElementById('ruleSame').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.rules.same = e.target.checked;
});
document.getElementById('rulePlus').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.rules.plus = e.target.checked;
});
document.getElementById('ruleUp').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.rules.up = e.target.checked;
});
document.getElementById('ruleCombo').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.rules.combo = e.target.checked;
});
document.getElementById('ruleElemental').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.rules.elemental = e.target.checked;
  // If turning the rule on mid-game and no tiles have elements yet, assign
  // some now — only to cells that are still empty, so cards already on the
  // board don't retroactively gain a tile bonus they weren't placed for.
  if (e.target.checked && state.boardElements.every(el => el === null)) {
    const emptyIndices = state.board
      .map((cell, i) => (cell === null ? i : -1))
      .filter(i => i !== -1);
    state.boardElements = generateBoardElements(emptyIndices);
  }
  renderBoard();
});
document.getElementById('elementalModeSelect').addEventListener('change', e => {
  if (rulesLockedForCurrentMode()) return;
  state.elementalMode = e.target.value;
  renderBoard();
});
document.getElementById('showAdjustedStatsToggle').addEventListener('change', e => {
  state.showAdjustedStats = e.target.checked;
  renderBoard();
});
// Reset/Play Again both used to just call initGame() unconditionally —
// fine when the only mode was a single local game, but in online/spectate
// mode that would wipe local state with a fresh local-only deal that then
// gets broadcast over the shared room's real game on this client's next
// move, or leave a spectator's view permanently diverged from the room.
// Simplest safe behavior for a prototype: only practice mode resets in
// place: online/spectate mode returns to the main menu instead, leaving
// the room cleanly (the room itself, and the other player's game, are
// untouched — Firebase doesn't get reset by leaving).
function resetOrLeaveToMenu() {
  if (state.mode === 'practice') {
    initGame();
  } else {
    leaveOnlineRoomOrSpectate();
    showMenuScreen();
  }
}
document.getElementById('resetBtn').addEventListener('click', resetOrLeaveToMenu);

// ---------------------------------------------------------------
// SETTINGS POPOUT
// ---------------------------------------------------------------
const settingsModal = document.getElementById('settingsModal');
const settingsRulesSection = document.getElementById('settingsRulesSection');
document.getElementById('settingsBtn').addEventListener('click', () => {
  // Opened from in-game (the title bar). In practice mode, Rules are
  // meaningful here — it's a solo local game, so changing them mid-game
  // is harmless and applies live. In online/spectate mode, rules already
  // got fixed for this room at deal time (see the [Follow-up] "lock
  // rules" task for the real agreed-upon-beforehand version of this) —
  // letting a seated player quietly flip a rule checkbox mid-game would
  // change how THEIR next move resolves (writeLocalStateToRoom pushes
  // state.rules on every move) without the other player ever agreeing to
  // it, so the whole section is hidden rather than exposing controls that
  // would desync or feel like cheating.
  if (state.mode === 'online' || state.mode === 'spectate') {
    settingsRulesSection.classList.add('hidden');
  } else {
    settingsRulesSection.classList.remove('hidden');
  }
  settingsModal.classList.add('show');
});
// Same modal, reachable from the main menu too (not just the in-game title
// bar) — #settingsModal is a true top-level sibling of #mainMenu/
// #gameScreen (see its own markup comment for why that matters), so it
// renders correctly no matter which screen is currently showing.
document.getElementById('menuSettings').addEventListener('click', () => {
  // Opened from the main menu, before any game/room has started — Rules
  // don't apply to anything yet (no game exists to apply them to, and for
  // online play rules aren't even meant to be freely edited per-client;
  // see the "[Follow-up] Lock online-room rules before game start" task),
  // so the whole section is omitted here rather than showing controls
  // that don't do anything meaningful yet.
  settingsRulesSection.classList.add('hidden');
  settingsModal.classList.add('show');
});
document.getElementById('settingsClose').addEventListener('click', () => {
  settingsModal.classList.remove('show');
});
// Clicking the dark backdrop (not the panel itself) also closes it.
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) settingsModal.classList.remove('show');
});
// The overlay's own reset button means something different per mode now
// (see updateOverlay): practice still resets in place, but online now
// requests a rematch instead of leaving (leaving is #overlayLeave's job).
// Spectate hides this button entirely, so it has no click behavior to
// wire here at all.
document.getElementById('overlayReset').addEventListener('click', () => {
  if (state.mode === 'practice') {
    initGame();
  } else if (state.mode === 'online') {
    requestRematch();
  }
});
document.getElementById('overlayLeave').addEventListener('click', () => {
  leaveOnlineRoomOrSpectate();
  showMenuScreen();
});

// Element Alignment: 0/10/20...100%, defaulting to 100%.
const alignmentSelect = document.getElementById('alignmentSelect');
for (let v = 0; v <= 100; v += 10) {
  const opt = document.createElement('option');
  opt.value = v;
  opt.textContent = v + '%';
  if (v === 100) opt.selected = true;
  alignmentSelect.appendChild(opt);
}
alignmentSelect.addEventListener('change', () => {
  state.elementAlignment = Number(alignmentSelect.value);
});

// Elemental Position Bias: 0/10/20...100%, defaulting to 80%.
const elementalBiasSelect = document.getElementById('elementalBiasSelect');
for (let v = 0; v <= 100; v += 10) {
  const opt = document.createElement('option');
  opt.value = v;
  opt.textContent = v + '%';
  if (v === 80) opt.selected = true;
  elementalBiasSelect.appendChild(opt);
}
elementalBiasSelect.addEventListener('change', () => {
  state.elementalBias = Number(elementalBiasSelect.value);
});

initMusicPlayer();
initSfxControls();
initMainMenu();

// ---------------------------------------------------------------
// MAIN MENU — the page's real entry point now: nothing game-related
// (initGame(), room joins) runs until the player picks one of Play / Join
// Room / Watch a Game / Practice here. #mainMenu and #gameScreen are
// simple mutually-exclusive screens (see .hidden CSS) toggled by
// showMenuScreen()/showGameScreen(), not routing in any real sense — this
// is one page, one game at a time, matching the rest of this file's
// single-page-app-by-hand style.
// ---------------------------------------------------------------
function showMenuScreen() {
  document.getElementById('mainMenu').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  // Always land back on the top-level button list, not mid-way through
  // whatever sub-panel (Join Room / Watch a Game) happened to be open the
  // last time the menu was visible — e.g. after leaving an online game.
  document.getElementById('joinRoomPanel').classList.add('hidden');
  document.getElementById('watchList').classList.add('hidden');
  document.getElementById('menuButtons').classList.remove('hidden');
  setMenuStatus('');
}

function showGameScreen() {
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  // Called synchronously here (inside whichever click handler navigated to
  // the game screen — Play/Join Room/Watch/Practice all funnel through
  // this function) so the resulting audio.play() attempt still counts as
  // within a user gesture. See tryStartMusicIfEnabled()'s own comment for
  // why this replaced the old first-interaction-anywhere approach.
  tryStartMusicIfEnabled();
}

function setMenuStatus(msg) {
  document.getElementById('menuStatus').textContent = msg || '';
}

function currentDisplayName() {
  const input = document.getElementById('menuDisplayName');
  const typed = input.value.trim();
  return typed || 'Player';
}

function initMainMenu() {
  const nameInput = document.getElementById('menuDisplayName');
  nameInput.value = getSavedDisplayName();
  nameInput.addEventListener('change', () => saveDisplayName(nameInput.value.trim()));

  document.getElementById('menuPractice').addEventListener('click', () => {
    leaveOnlineRoomOrSpectate();
    showGameScreen();
    initGame();
  });

  document.getElementById('menuPlay').addEventListener('click', async () => {
    setMenuStatus('Finding a game...');
    const name = currentDisplayName();
    saveDisplayName(name);
    try {
      const result = await findOrCreateOpenRoom(name);
      if (!result) {
        setMenuStatus('Could not find or create a room. Try again.');
        return;
      }
      setMenuStatus('');
      showGameScreen();
      startOnlineRoom(result.roomId, result.seat);
    } catch (err) {
      // Surfacing the real error text (not just a generic guess) matters
      // here specifically because Firebase permission-denied errors (e.g.
      // expired test-mode database rules — these auto-expire 30 days
      // after a Realtime Database is created) fail this exact way: the
      // promise rejects, but with no visible symptom otherwise — the room
      // silently never gets created/joined and nothing about the online
      // flow (matchmaking, the waiting message, etc.) ever runs, which
      // looks identical to a logic bug from the outside.
      setMenuStatus('Connection error: ' + (err && err.message ? err.message : err));
    }
  });

  document.getElementById('menuJoinRoom').addEventListener('click', () => {
    document.getElementById('menuButtons').classList.add('hidden');
    document.getElementById('joinRoomPanel').classList.remove('hidden');
  });
  document.getElementById('joinRoomBack').addEventListener('click', () => {
    document.getElementById('joinRoomPanel').classList.add('hidden');
    document.getElementById('menuButtons').classList.remove('hidden');
  });
  document.getElementById('joinRoomGo').addEventListener('click', async () => {
    const roomId = document.getElementById('joinRoomInput').value.trim();
    if (!roomId) { setMenuStatus('Enter a room ID.'); return; }
    setMenuStatus('Joining room...');
    const name = currentDisplayName();
    saveDisplayName(name);
    try {
      const result = await joinSpecificRoom(roomId, name);
      if (!result) {
        setMenuStatus('That room is full.');
        return;
      }
      setMenuStatus('');
      document.getElementById('joinRoomPanel').classList.add('hidden');
      document.getElementById('menuButtons').classList.remove('hidden');
      showGameScreen();
      startOnlineRoom(result.roomId, result.seat);
    } catch (err) {
      // Surfacing the real error text (not just a generic guess) matters
      // here specifically because Firebase permission-denied errors (e.g.
      // expired test-mode database rules — these auto-expire 30 days
      // after a Realtime Database is created) fail this exact way: the
      // promise rejects, but with no visible symptom otherwise — the room
      // silently never gets created/joined and nothing about the online
      // flow (matchmaking, the waiting message, etc.) ever runs, which
      // looks identical to a logic bug from the outside.
      setMenuStatus('Connection error: ' + (err && err.message ? err.message : err));
    }
  });

  document.getElementById('menuWatch').addEventListener('click', async () => {
    document.getElementById('menuButtons').classList.add('hidden');
    document.getElementById('watchList').classList.remove('hidden');
    await refreshWatchList();
  });
  document.getElementById('watchListBack').addEventListener('click', () => {
    document.getElementById('watchList').classList.add('hidden');
    document.getElementById('menuButtons').classList.remove('hidden');
  });
}

// Lists every known room (via the lightweight rooms index) that currently
// has at least one seat claimed — an empty room nobody's joined yet isn't
// really "active" and would just be noise in a spectate list.
async function refreshWatchList() {
  const container = document.getElementById('watchListItems');
  container.innerHTML = '<div class="watch-room-empty">Loading...</div>';
  const indexSnap = await rtdb.ref(ROOM_ID_LIST_PATH).once('value');
  const roomIds = indexSnap.exists() ? Object.keys(indexSnap.val()) : [];
  if (!roomIds.length) {
    container.innerHTML = '<div class="watch-room-empty">No active games right now.</div>';
    return;
  }
  const rooms = await Promise.all(roomIds.map(async id => {
    const snap = await rtdb.ref(`${ROOMS_ROOT}/${id}`).once('value');
    return { id, room: snap.val() };
  }));
  const active = rooms.filter(r => r.room && r.room.seats && (r.room.seats.p1 || r.room.seats.p2));
  if (!active.length) {
    container.innerHTML = '<div class="watch-room-empty">No active games right now.</div>';
    return;
  }
  container.innerHTML = '';
  active.forEach(({ id, room }) => {
    const p1Name = room.seats.p1 ? room.seats.p1.name : '(open)';
    const p2Name = room.seats.p2 ? room.seats.p2.name : '(open)';
    const item = document.createElement('div');
    item.className = 'watch-room-item';
    item.innerHTML = `<span>${p1Name} vs ${p2Name}</span><span>${room.gameOver ? 'Finished' : 'Live'}</span>`;
    item.addEventListener('click', () => {
      document.getElementById('watchList').classList.add('hidden');
      showGameScreen();
      startSpectating(id);
    });
    container.appendChild(item);
  });
}

// ---------------------------------------------------------------
// CARD NUMBER LAYOUT (OG classic corner cluster vs Adjusted edges)
// ---------------------------------------------------------------
const layoutSelect = document.getElementById('layoutSelect');
layoutSelect.addEventListener('change', () => {
  document.body.classList.remove('layout-og', 'layout-adjusted');
  document.body.classList.add('layout-' + layoutSelect.value);
});

// ---------------------------------------------------------------
// CARD/BOARD SHAPE (Natural = 1.25x taller than square, default;
// Square = base square dimensions)

const shapeSelect = document.getElementById('shapeSelect');
shapeSelect.addEventListener('change', () => {
  document.body.classList.remove('shape-natural', 'shape-square');
  document.body.classList.add('shape-' + shapeSelect.value);
  syncHandBoardCenter();
});

// ---------------------------------------------------------------
// WEBSITE BACKGROUND (found in Backgrounds/ folder)
// ---------------------------------------------------------------
const bgSelect = document.getElementById('bgSelect');
bgSelect.addEventListener('change', () => {
  const val = bgSelect.value === 'none' ? 'none' : `url('${bgSelect.value}')`;
  document.body.style.setProperty('--bg-image', val);
});

// ---------------------------------------------------------------
// HAND STYLE (Default = spaced list; Stack = ~50% overlapping cards,
// hovered card comes to front). Only affects the hand, not the board.
// ---------------------------------------------------------------
const handStyleSelect = document.getElementById('handStyleSelect');
const handContainers = [document.getElementById('handP1'), document.getElementById('handP2')];
handStyleSelect.addEventListener('change', () => {
  handContainers.forEach(el => el.classList.toggle('stack', handStyleSelect.value === 'stack'));
  syncHandBoardCenter();
});

window.addEventListener('resize', syncHandBoardCenter);

// ---------------------------------------------------------------
// SETTINGS PERSISTENCE (remembers every Settings-panel choice in
// localStorage so it's restored the next time the page loads)
// ---------------------------------------------------------------
const SETTINGS_STORAGE_KEY = 'tripleTriadSettings';
// Order matters for a couple of these: Elemental Mode/Alignment need to be
// applied before the Elemental rule checkbox, since turning that rule on
// generates the board's element tiles using whatever alignment is set at
// that moment.
const PERSISTED_CONTROL_IDS = [
  'ruleSame', 'rulePlus', 'ruleUp', 'ruleCombo',
  'elementalModeSelect', 'alignmentSelect', 'elementalBiasSelect', 'showAdjustedStatsToggle', 'ruleElemental',
  'layoutSelect', 'shapeSelect', 'bgSelect', 'handStyleSelect',
  'musicSelect', 'volumeSelect', 'autoplayToggle',
  'sfxToggle', 'sfxHoverToggle', 'cursorVolumeSelect', 'cardVolumeSelect',
];

function saveSettings() {
  const saved = {};
  PERSISTED_CONTROL_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    saved[id] = el.type === 'checkbox' ? el.checked : el.value;
  });
  try { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(saved)); } catch (e) {}
}

function loadSavedSettings() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY)); } catch (e) { return; }
  if (!saved) return;
  PERSISTED_CONTROL_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el || !(id in saved)) return;
    if (el.type === 'checkbox') {
      el.checked = saved[id];
    } else {
      el.value = saved[id];
    }
    // Reuse each control's own existing change handler to actually apply
    // the restored value, rather than duplicating that logic here.
    el.dispatchEvent(new Event('change'));
  });
}

PERSISTED_CONTROL_IDS.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', saveSettings);
});

loadSavedSettings();
</script>
